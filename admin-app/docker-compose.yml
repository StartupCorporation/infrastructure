version: '3.9'
name: admin

services:

  web-app:
    build:
      dockerfile: Dockerfile
      context: .
      additional_contexts:
        - src-admin-app=../app
    environment:
      - DB_USERNAME=${DATABASE_USERNAME}
      - DB_PASSWORD=${DATABASE_PASSWORD}
      - DB=${DATABASE_DATABASE}
      - DB_HOST=${DATABASE_HOST}
      - DB_PORT=${DATABASE_PORT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_URL=${MINIO_URL}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME}
      - RABBITMQ_USERNAME=${RABBITMQ_USERNAME}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - RABBITMQ_HOST=${RABBITMQ_HOST}
      - RABBITMQ_PORT=${RABBITMQ_PORT}
      - RABBITMQ_QUEUE_CATEGORY__NAME=${RABBITMQ_QUEUE_CATEGORY__NAME}
      - RABBITMQ_QUEUE_CATEGORY__DURABLE=${RABBITMQ_QUEUE_CATEGORY__DURABLE}
    ports:
      - "${DOCKER_ADMIN_APPLICATION_EXPOSE_PORT}:8080"
    depends_on:
      minio:
        condition: service_healthy

  minio:
    image: quay.io/minio/minio
    ports:
      - "${DOCKER_MINIO_EXPOSE_PORT_UI}:9000"
      - "${DOCKER_MINIO_EXPOSE_PORT_CONSOLE}:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: "curl -k -f http://localhost:9001/minio/health/live || exit 1"
      interval: 1s
      timeout: 15s
      retries: 30

  create_bucket:
    image: minio/mc
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME}
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY};
      /usr/bin/mc mb myminio/${MINIO_BUCKET_NAME};
      /usr/bin/mc anonymous set download myminio/${MINIO_BUCKET_NAME};
      exit 0;
      "
networks:
  default:
    name: deye-web-network
    external: true

volumes:
  minio_data:
